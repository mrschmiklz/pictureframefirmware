# NAS picture sync configuration (generated per device profile)
# Path on device: /data/local/frame-sync/nas.conf

DEVICE_PROFILE=pf109_aimor

# SMB server and share (UNC \\192.168.1.23\nas\framepics)
NAS_HOST=192.168.1.23
NAS_SHARE=nas
NAS_PATH=framepics

# Firmware/script updates (UNC \\192.168.1.23\nas\frame-deploy)
DEPLOY_PATH=frame-deploy

# Wi-Fi boot console command queue (UNC \\192.168.1.23\nas\frame-console)
CONSOLE_PATH=frame-console
AGENT_PORT=8080
AGENT_TOKEN=frame-local

# Leave blank for guest/anonymous if your Samba share allows it
NAS_USER=
NAS_PASS=

# Slideshow app paths (Aimor defaults; auto-filled from config/devices.json)
AIMOR_PKG=com.efercro.os.aimor
AIMOR_DB=/data/data/com.efercro.os.aimor/databases/db_aimor.db
IMAGE_DIR=/sdcard/aimor/image
PHOTO_WIDTH=1280
PHOTO_HEIGHT=800

# How often to check for new photos (seconds)
SYNC_INTERVAL=300

# Set to 1 to remove slideshow entries when photos disappear from the NAS
MIRROR_MODE=1
