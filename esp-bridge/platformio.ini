; ESP32 Wi-Fi ADB bridge for picture frame management.
; Flash: powershell -ExecutionPolicy Bypass -File esp-bridge\flash.ps1
[platformio]
extra_configs = secrets.ini
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DWIFI_SSID=\"${secrets.wifi_ssid}\"
  -DWIFI_PASSWORD=\"${secrets.wifi_password}\"
  -DFRAME_IP=\"${secrets.frame_ip}\"
  -DBRIDGE_PORT=${secrets.bridge_port}
  -DFRAME_ADB_PORT=${secrets.frame_adb_port}

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  ${env:esp32dev.build_flags}
  -DBOARD_HAS_PSRAM
